<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/css/all.min.css" integrity="sha512-YWzhKL2whUzgiheMoBFwW8CKV4qpHQAEuvilg9FAn5VJUDwKZZxkJNuGM4XkWuk94WCrrwslk8yWNGmY1EduTA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <div class="top flex">
        <div class="top-left flex">
            <div class="red button"></div>
            <div class="orange button"></div>
            <div class="green button"></div>
        </div>
        <div class="top-center">
            Zoom Meeting ID: <input type="search" name="Zoom Meeting ID:" id="">
        </div>
    </div>


    </header>

    <main>
        <div class="container_top flex">


            <div class="top_side flex">
                <div class="icon_speakerview">
                    <i class="fas fa-table"></i>
                    <span> Speaker View </span> 
                </div>
            

            <div class="icon_fullscreen">
                <i class="fas fa-expand-arrows-alt"></i>
            </div>
        </div>

        </div>


        <div class="col_80 clearfix">


        <div class="col_10 left_col">
            <div class="left_side flex">
                <div class="icon_arrow_left">
                    <i class="fas fa-caret-left"></i>
                    <p>
                        1/2
                    </p>
                </div>
            </div>
        </div>


        <div class="col_80">

        </div>

        <div class="col_10">
                <div class="right_side">
                    <div class="icon_arrow_right">
                        <i class="fas fa-caret-right"></i>
                        <p>
                            1/2
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </div>


    </main>
    <footer></footer>





    
</body>
</html>
